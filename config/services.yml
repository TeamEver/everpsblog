services:
  _defaults:
    autowire: true
    autoconfigure: false
    public: false

  prestashop.module.everpsblog.command.run_cron:
    class: PrestaShop\Module\Everpsblog\Command\RunCronCommand
    tags:
      - { name: 'console.command' }

  prestashop.module.everpsblog.blog.post_rules_applier:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandHandler\PostRulesApplier

  prestashop.module.everpsblog.blog.post_data_builder:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandHandler\PostCommandDataBuilder
    arguments:
      - '@=service("prestashop.adapter.legacy.context").getContext().shop.id'
      - '@=service("prestashop.adapter.legacy.configuration").get("EVERBLOG_UNCLASSED_ID")'

  prestashop.module.everpsblog.blog.create_post_handler:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandHandler\CreatePostHandler
    arguments:
      - '@prestashop.module.everpsblog.blog.post_rules_applier'

  prestashop.module.everpsblog.blog.update_post_handler:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandHandler\UpdatePostHandler
    arguments:
      - '@prestashop.module.everpsblog.blog.post_rules_applier'

  prestashop.module.everpsblog.blog.delete_post_handler:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandHandler\DeletePostHandler

  prestashop.module.everpsblog.blog.command_bus:
    class: PrestaShop\Module\Everpsblog\Core\Domain\Blog\CommandBus\InMemoryCommandBus
    arguments:
      -
        PrestaShop\Module\Everpsblog\Core\Domain\Blog\Command\CreatePostCommand: '@prestashop.module.everpsblog.blog.create_post_handler'
        PrestaShop\Module\Everpsblog\Core\Domain\Blog\Command\UpdatePostCommand: '@prestashop.module.everpsblog.blog.update_post_handler'
        PrestaShop\Module\Everpsblog\Core\Domain\Blog\Command\DeletePostCommand: '@prestashop.module.everpsblog.blog.delete_post_handler'

  prestashop.module.everpsblog.repository.post:
    class: PrestaShop\Module\Everpsblog\Repository\PostRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Post']

  prestashop.module.everpsblog.repository.category:
    class: PrestaShop\Module\Everpsblog\Repository\CategoryRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Category']

  prestashop.module.everpsblog.repository.tag:
    class: PrestaShop\Module\Everpsblog\Repository\TagRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Tag']

  prestashop.module.everpsblog.repository.author:
    class: PrestaShop\Module\Everpsblog\Repository\AuthorRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Author']

  prestashop.module.everpsblog.repository.comment:
    class: PrestaShop\Module\Everpsblog\Repository\CommentRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Comment']

  prestashop.module.everpsblog.repository.image:
    class: PrestaShop\Module\Everpsblog\Repository\ImageRepository
    factory: ['@doctrine.orm.entity_manager', getRepository]
    arguments: ['PrestaShop\Module\Everpsblog\Entity\Image']

  PrestaShop\Module\Everpsblog\Repository\PostRepository: '@prestashop.module.everpsblog.repository.post'
  PrestaShop\Module\Everpsblog\Repository\CategoryRepository: '@prestashop.module.everpsblog.repository.category'
  PrestaShop\Module\Everpsblog\Repository\TagRepository: '@prestashop.module.everpsblog.repository.tag'
  PrestaShop\Module\Everpsblog\Repository\AuthorRepository: '@prestashop.module.everpsblog.repository.author'
  PrestaShop\Module\Everpsblog\Repository\CommentRepository: '@prestashop.module.everpsblog.repository.comment'
  PrestaShop\Module\Everpsblog\Repository\ImageRepository: '@prestashop.module.everpsblog.repository.image'

  prestashop.module.everpsblog.adapter.legacy_context:
    class: PrestaShop\Module\Everpsblog\Adapter\LegacyContextAdapter

  prestashop.module.everpsblog.adapter.legacy_configuration:
    class: PrestaShop\Module\Everpsblog\Adapter\LegacyConfigurationAdapter

  prestashop.module.everpsblog.adapter.legacy_shop:
    class: PrestaShop\Module\Everpsblog\Adapter\LegacyShopAdapter

  prestashop.module.everpsblog.adapter.legacy_language:
    class: PrestaShop\Module\Everpsblog\Adapter\LegacyLanguageAdapter

  prestashop.module.everpsblog.service.context_state:
    class: PrestaShop\Module\Everpsblog\Service\ContextStateService
    arguments:
      - '@prestashop.module.everpsblog.adapter.legacy_context'

  prestashop.module.everpsblog.blog.validator.post_request:
    class: PrestaShop\Module\Everpsblog\Application\Blog\PostRequestValidator

  prestashop.module.everpsblog.blog.assembler.post_command:
    class: PrestaShop\Module\Everpsblog\Application\Blog\PostCommandAssembler
    arguments:
      - '@prestashop.module.everpsblog.blog.post_data_builder'
      - '@prestashop.module.everpsblog.blog.validator.post_request'

  prestashop.module.everpsblog.blog.image_uploader:
    class: PrestaShop\Module\Everpsblog\Service\ImageUploader

  PrestaShop\Module\Everpsblog\Service\ContextStateService: '@prestashop.module.everpsblog.service.context_state'

  prestashop.module.everpsblog.service.blog_install:
    class: PrestaShop\Module\Everpsblog\Service\BlogInstallService

  prestashop.module.everpsblog.service.blog_taxonomy:
    class: PrestaShop\Module\Everpsblog\Service\BlogTaxonomyService

  prestashop.module.everpsblog.service.blog_sitemap:
    class: PrestaShop\Module\Everpsblog\Service\BlogSitemapService

  prestashop.module.everpsblog.service.legacy_import_adapter:
    class: PrestaShop\Module\Everpsblog\Service\LegacyImportAdapter

  PrestaShop\Module\Everpsblog\Service\BlogInstallService: '@prestashop.module.everpsblog.service.blog_install'
  PrestaShop\Module\Everpsblog\Service\BlogTaxonomyService: '@prestashop.module.everpsblog.service.blog_taxonomy'
  PrestaShop\Module\Everpsblog\Service\BlogSitemapService: '@prestashop.module.everpsblog.service.blog_sitemap'
  PrestaShop\Module\Everpsblog\Service\LegacyImportAdapter: '@prestashop.module.everpsblog.service.legacy_import_adapter'
  PrestaShop\Module\Everpsblog\Application\Blog\PostCommandAssembler: '@prestashop.module.everpsblog.blog.assembler.post_command'
  PrestaShop\Module\Everpsblog\Application\Blog\PostRequestValidator: '@prestashop.module.everpsblog.blog.validator.post_request'
  PrestaShop\Module\Everpsblog\Service\ImageUploader: '@prestashop.module.everpsblog.blog.image_uploader'

  PrestaShop\Module\Everpsblog\Service\AdminRouteSigner: ~


  prestashop.module.everpsblog.security.permission_provider:
    class: PrestaShop\Module\Everpsblog\Service\Security\BackOfficePermissionProvider

  prestashop.module.everpsblog.security.resource_voter:
    class: PrestaShop\Module\Everpsblog\Security\BlogResourceVoter
    arguments:
      - '@prestashop.module.everpsblog.security.permission_provider'
    tags:
      - { name: security.voter }

  prestashop.module.everpsblog.audit.sensitive_action_logger:
    class: PrestaShop\Module\Everpsblog\Service\Audit\SensitiveActionLogger
    arguments:
      - '@logger'

  PrestaShop\Module\Everpsblog\Service\Security\BackOfficePermissionProvider: '@prestashop.module.everpsblog.security.permission_provider'
  PrestaShop\Module\Everpsblog\Service\Audit\SensitiveActionLogger: '@prestashop.module.everpsblog.audit.sensitive_action_logger'

  prestashop.module.everpsblog.controller.admin.post:
    class: PrestaShop\Module\Everpsblog\Controller\Admin\PostController
    arguments:
      - '@prestashop.module.everpsblog.service.context_state'
      - '@prestashop.module.everpsblog.blog.command_bus'
      - '@prestashop.module.everpsblog.blog.assembler.post_command'
      - '@PrestaShop\Module\Everpsblog\Grid\Definition\PostGridDefinitionFactory'
      - '@PrestaShop\Module\Everpsblog\Grid\Data\PostGridDataFactory'
      - '@PrestaShop\Module\Everpsblog\Form\DataProvider\PostFormDataProvider'
      - '@prestashop.module.everpsblog.audit.sensitive_action_logger'
    public: true

  prestashop.module.everpsblog.controller.admin.category:
    class: PrestaShop\Module\Everpsblog\Controller\Admin\CategoryController
    arguments:
      - '@prestashop.module.everpsblog.service.context_state'
      - '@PrestaShop\Module\Everpsblog\Grid\Definition\CategoryGridDefinitionFactory'
      - '@PrestaShop\Module\Everpsblog\Grid\Data\CategoryGridDataFactory'
      - '@PrestaShop\Module\Everpsblog\Form\DataProvider\CategoryFormDataProvider'
    public: true

  prestashop.module.everpsblog.controller.admin.tag:
    class: PrestaShop\Module\Everpsblog\Controller\Admin\TagController
    arguments:
      - '@prestashop.module.everpsblog.service.context_state'
      - '@PrestaShop\Module\Everpsblog\Grid\Definition\TagGridDefinitionFactory'
      - '@PrestaShop\Module\Everpsblog\Grid\Data\TagGridDataFactory'
      - '@PrestaShop\Module\Everpsblog\Form\DataProvider\TagFormDataProvider'
    public: true

  prestashop.module.everpsblog.controller.admin.author:
    class: PrestaShop\Module\Everpsblog\Controller\Admin\AuthorController
    arguments:
      - '@prestashop.module.everpsblog.service.context_state'
      - '@PrestaShop\Module\Everpsblog\Grid\Definition\AuthorGridDefinitionFactory'
      - '@PrestaShop\Module\Everpsblog\Grid\Data\AuthorGridDataFactory'
      - '@PrestaShop\Module\Everpsblog\Form\DataProvider\AuthorFormDataProvider'
    public: true

  prestashop.module.everpsblog.controller.admin.comment:
    class: PrestaShop\Module\Everpsblog\Controller\Admin\CommentController
    arguments:
      - '@prestashop.module.everpsblog.service.context_state'
      - '@PrestaShop\Module\Everpsblog\Grid\Definition\CommentGridDefinitionFactory'
      - '@PrestaShop\Module\Everpsblog\Grid\Data\CommentGridDataFactory'
      - '@PrestaShop\Module\Everpsblog\Form\DataProvider\CommentFormDataProvider'
    public: true

  PrestaShop\Module\Everpsblog\Grid\Definition\:
    resource: '../src/Grid/Definition/*'

  PrestaShop\Module\Everpsblog\Grid\Data\:
    resource: '../src/Grid/Data/*'

  PrestaShop\Module\Everpsblog\Form\Type\Admin\:
    resource: '../src/Form/Type/Admin/*'

  PrestaShop\Module\Everpsblog\Form\DataProvider\:
    resource: '../src/Form/DataProvider/*'

  PrestaShop\Module\Everpsblog\Adapter\:
    resource: '../src/Adapter/*'

  PrestaShop\Module\Everpsblog\Application\Blog\:
    resource: '../src/Application/Blog/*'

  PrestaShop\Module\Everpsblog\Security\:
    resource: '../src/Security/*'

  PrestaShop\Module\Everpsblog\Service\Security\:
    resource: '../src/Service/Security/*'

  PrestaShop\Module\Everpsblog\Service\Audit\:
    resource: '../src/Service/Audit/*'
